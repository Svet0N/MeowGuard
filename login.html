<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowGuard | Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <!-- Soft Gradient Backgrounds -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <a href="index.html" class="mobile-back-btn">
        <span>←</span> Начало
    </a>

    <main class="page-transition" id="main-content" style="display: flex; justify-content: center; width: 100%;">
        <div class="login-container">
            <div class="bento-card">
                <div class="login-header">
                    <h1 class="hero-gradient-text">Добре дошли отново! 🐾</h1>
                    <p>Влезте в профила си, за да следите здравето на Вашата котка.</p>
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label>Електронна поща</label>
                        <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Парола</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="login-actions">
                        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Влез</button>
                        <a href="#" class="forgot-password">Забравена парола?</a>
                    </div>
                </form>

                <div class="register-link">
                    Нямате профил? <a href="onboarding.html">Започнете тук</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Supabase SDK & Modules -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="ui.js"></script>
    <script src="login.js"></script>
</body>

</html>
